<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Rueda — Logística de Camiones</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Inter+Tight:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1115;
  --bg-2: #161922;
  --bg-3: #1d212c;
  --panel: #1a1e29;
  --line: #262b38;
  --line-2: #323849;
  --ink: #e7ebf3;
  --ink-2: #9aa3b4;
  --ink-3: #5d6577;
  --accent: #ffcc33;
  --accent-2: #ff7a1a;
  --green: #4ade80;
  --red: #ff5e5b;
  --blue: #5eb3ff;
  --purple: #b794f4;
  --cyan: #4dd0e1;
  --whatsapp: #25d366;

  --s-nuevo: #5eb3ff;
  --s-buscando: #ffcc33;
  --s-parcial: #ff9f43;
  --s-cubierto: #4dd0e1;
  --s-cargando: #b794f4;
  --s-viaje: #4ade80;
  --s-descargado: #6c7280;
  --s-cancelado: #ff5e5b;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Inter Tight', sans-serif;
  font-size: 14px;
  line-height: 1.4;
  overflow-x: hidden;
  min-height: 100vh;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
  background-size: 32px 32px;
  pointer-events: none;
  z-index: 0;
}

button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, select, textarea { font-family: inherit; }

/* ============ TOP BAR ============ */
.topbar {
  position: sticky; top: 0; z-index: 50;
  background: var(--bg);
  border-bottom: 1px solid var(--line);
  padding: 10px 16px;
  display: flex; align-items: center; gap: 12px;
}

.brand {
  display: flex; align-items: center; gap: 10px;
  flex-shrink: 0;
}
.brand-mark {
  width: 30px; height: 30px;
  background: var(--accent);
  display: grid; place-items: center;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 800;
  color: #000;
  font-size: 16px;
  border-radius: 4px;
  transform: rotate(-3deg);
}
.brand-name {
  font-weight: 900;
  font-size: 18px;
  letter-spacing: -0.02em;
}
.brand-name span { color: var(--ink-3); font-weight: 500; }

.live-dot {
  display: inline-block;
  width: 7px; height: 7px;
  background: var(--green);
  border-radius: 50%;
  box-shadow: 0 0 0 0 var(--green);
  animation: pulse 2s infinite;
  margin-left: 8px;
}
@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.6); }
  70% { box-shadow: 0 0 0 8px rgba(74, 222, 128, 0); }
  100% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0); }
}

.topbar-spacer { flex: 1; }

.clock {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  color: var(--ink-2);
  display: flex; align-items: center; gap: 8px;
}
.clock-time { color: var(--ink); font-weight: 700; }

.nav-tabs {
  display: flex;
  gap: 2px;
  background: var(--bg-2);
  padding: 3px;
  border-radius: 6px;
  border: 1px solid var(--line);
}
.nav-tab {
  padding: 6px 12px;
  font-size: 12px;
  font-weight: 600;
  color: var(--ink-2);
  border-radius: 4px;
  letter-spacing: 0.02em;
  text-transform: uppercase;
  transition: all 0.15s;
}
.nav-tab:hover { color: var(--ink); }
.nav-tab.active {
  background: var(--ink);
  color: #000;
}

/* ============ STATS BAR ============ */
.stats {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 1px;
  background: var(--line);
  border-bottom: 1px solid var(--line);
}
.stat {
  background: var(--bg);
  padding: 12px 16px;
  display: flex; flex-direction: column;
  gap: 2px;
}
.stat-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-3);
}
.stat-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.02em;
  display: flex; align-items: baseline; gap: 6px;
}
.stat-value .small {
  font-size: 13px;
  color: var(--ink-3);
}
.stat-value.green { color: var(--green); }
.stat-value.yellow { color: var(--accent); }
.stat-value.red { color: var(--red); }
.stat-value.blue { color: var(--blue); }

/* ============ FILTERS ============ */
.filters {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 16px;
  background: var(--bg-2);
  border-bottom: 1px solid var(--line);
  overflow-x: auto;
  white-space: nowrap;
}
.filter-chip {
  padding: 5px 11px;
  font-size: 12px;
  font-weight: 600;
  border: 1px solid var(--line-2);
  border-radius: 20px;
  color: var(--ink-2);
  display: inline-flex; align-items: center; gap: 6px;
  flex-shrink: 0;
}
.filter-chip:hover { color: var(--ink); border-color: var(--ink-3); }
.filter-chip.active {
  background: var(--ink);
  color: #000;
  border-color: var(--ink);
}
.filter-chip .count {
  background: rgba(0,0,0,0.2);
  padding: 1px 6px;
  border-radius: 10px;
  font-size: 11px;
  font-family: 'JetBrains Mono', monospace;
}
.filter-chip:not(.active) .count {
  background: var(--bg-3);
}

.search-box {
  margin-left: auto;
  display: flex; align-items: center;
  background: var(--bg);
  border: 1px solid var(--line-2);
  border-radius: 6px;
  padding: 0 10px;
  flex-shrink: 0;
}
.search-box input {
  background: transparent; border: none; outline: none;
  color: var(--ink);
  font-size: 13px;
  padding: 6px 0;
  width: 180px;
}
.search-box svg { color: var(--ink-3); flex-shrink: 0; }

/* ============ KANBAN ============ */
.board {
  display: flex;
  gap: 12px;
  padding: 14px 16px 100px;
  overflow-x: auto;
  min-height: calc(100vh - 200px);
  position: relative;
  z-index: 1;
}

.column {
  flex: 0 0 280px;
  display: flex; flex-direction: column;
  gap: 10px;
}

.column-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 4px;
  border-bottom: 2px solid var(--col-color, var(--ink-3));
}
.column-title {
  display: flex; align-items: center; gap: 8px;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.column-title-dot {
  width: 8px; height: 8px;
  background: var(--col-color);
  border-radius: 2px;
}
.column-count {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  font-weight: 700;
  color: var(--ink-2);
}

.column-body {
  display: flex; flex-direction: column;
  gap: 8px;
  min-height: 60px;
}

.empty-col {
  border: 1px dashed var(--line);
  border-radius: 6px;
  padding: 24px 12px;
  text-align: center;
  font-size: 11px;
  color: var(--ink-3);
  letter-spacing: 0.04em;
}

/* ============ CARD ============ */
.card {
  background: var(--panel);
  border: 1px solid var(--line);
  border-left: 3px solid var(--col-color, var(--ink-3));
  border-radius: 6px;
  padding: 10px 12px;
  cursor: pointer;
  transition: all 0.15s ease;
  position: relative;
}
.card:hover {
  border-color: var(--line-2);
  border-left-color: var(--col-color, var(--ink-3));
  transform: translateY(-1px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.3);
}

.card-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 6px;
}
.card-id {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  font-weight: 700;
  color: var(--ink-3);
  letter-spacing: 0.05em;
}
.card-time {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--ink-3);
}

.card-client {
  font-size: 14px;
  font-weight: 700;
  letter-spacing: -0.01em;
  margin-bottom: 8px;
}

.card-route {
  font-size: 12px;
  color: var(--ink-2);
  margin-bottom: 8px;
  display: flex; align-items: center; gap: 6px;
  line-height: 1.3;
}
.card-route .arrow {
  color: var(--ink-3);
  font-family: 'JetBrains Mono', monospace;
}

.card-foot {
  display: flex; align-items: center; justify-content: space-between;
  padding-top: 8px;
  border-top: 1px dashed var(--line);
}

.card-product {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--accent);
  background: rgba(255, 204, 51, 0.08);
  padding: 2px 6px;
  border-radius: 3px;
}

.coverage {
  display: flex; align-items: center; gap: 6px;
}
.coverage-bar {
  width: 60px; height: 6px;
  background: var(--bg);
  border-radius: 2px;
  overflow: hidden;
  border: 1px solid var(--line);
}
.coverage-fill {
  height: 100%;
  background: var(--col-color, var(--green));
  transition: width 0.3s;
}
.coverage-text {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 700;
}

/* ============ FAB ============ */
.fab {
  position: fixed;
  bottom: 20px; right: 20px;
  width: 60px; height: 60px;
  background: var(--accent);
  color: #000;
  border-radius: 50%;
  display: grid; place-items: center;
  font-size: 30px;
  font-weight: 300;
  box-shadow: 0 8px 24px rgba(255, 204, 51, 0.4), 0 2px 0 rgba(0,0,0,0.2);
  z-index: 40;
  transition: all 0.2s;
}
.fab:hover {
  transform: translateY(-2px) scale(1.05);
  box-shadow: 0 12px 32px rgba(255, 204, 51, 0.5);
}
.fab:active { transform: scale(0.95); }

/* ============ MODAL ============ */
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px);
  display: none;
  align-items: center; justify-content: center;
  z-index: 100;
  padding: 20px;
}
.modal-backdrop.active { display: flex; }

.modal {
  background: var(--bg-2);
  border: 1px solid var(--line-2);
  border-radius: 10px;
  width: 100%;
  max-width: 540px;
  max-height: 92vh;
  overflow-y: auto;
  position: relative;
}
.modal-head {
  position: sticky; top: 0;
  background: var(--bg-2);
  border-bottom: 1px solid var(--line);
  padding: 14px 18px;
  display: flex; align-items: center; justify-content: space-between;
  z-index: 5;
}
.modal-title {
  font-size: 16px;
  font-weight: 800;
  letter-spacing: -0.01em;
  display: flex; align-items: center; gap: 8px;
}
.modal-title-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  background: var(--accent);
  color: #000;
  padding: 2px 6px;
  border-radius: 3px;
  font-weight: 700;
}
.modal-close {
  width: 32px; height: 32px;
  display: grid; place-items: center;
  border-radius: 4px;
  color: var(--ink-2);
  font-size: 22px;
  line-height: 1;
}
.modal-close:hover { background: var(--bg-3); color: var(--ink); }

.modal-body { padding: 18px; }

.field { margin-bottom: 14px; }
.field-label {
  display: block;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-3);
  margin-bottom: 6px;
}
.field input,
.field select,
.field textarea {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--line);
  border-radius: 5px;
  padding: 10px 12px;
  color: var(--ink);
  font-size: 14px;
  outline: none;
  transition: border 0.15s;
}
.field input:focus,
.field select:focus,
.field textarea:focus {
  border-color: var(--accent);
}

.field-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.product-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
}
.product-pill {
  padding: 8px 4px;
  background: var(--bg);
  border: 1px solid var(--line);
  border-radius: 5px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  text-align: center;
  transition: all 0.15s;
}
.product-pill:hover { border-color: var(--ink-3); }
.product-pill.selected {
  background: var(--accent);
  color: #000;
  border-color: var(--accent);
}

.qty-control {
  display: flex; align-items: center;
  background: var(--bg);
  border: 1px solid var(--line);
  border-radius: 5px;
  overflow: hidden;
}
.qty-btn {
  width: 44px; height: 44px;
  font-size: 20px;
  font-weight: 700;
  color: var(--ink);
  background: var(--bg-3);
  display: grid; place-items: center;
}
.qty-btn:hover { background: var(--line-2); }
.qty-input {
  flex: 1;
  text-align: center;
  background: transparent;
  border: none;
  font-family: 'JetBrains Mono', monospace;
  font-size: 20px;
  font-weight: 700;
  color: var(--ink);
  outline: none;
  width: 100%;
}

.modal-foot {
  position: sticky; bottom: 0;
  background: var(--bg-2);
  border-top: 1px solid var(--line);
  padding: 14px 18px;
  display: flex; gap: 10px;
}
.btn {
  flex: 1;
  padding: 12px;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  transition: all 0.15s;
}
.btn-primary {
  background: var(--accent);
  color: #000;
}
.btn-primary:hover { background: #ffd84d; }
.btn-secondary {
  background: var(--bg-3);
  color: var(--ink-2);
  border: 1px solid var(--line);
}
.btn-secondary:hover { color: var(--ink); border-color: var(--line-2); }
.btn-danger {
  background: transparent;
  color: var(--red);
  border: 1px solid var(--red);
}
.btn-danger:hover { background: rgba(255, 94, 91, 0.1); }
.btn-wa {
  background: var(--whatsapp);
  color: #fff;
}
.btn-wa:hover { background: #20bf5b; }

/* ============ DETAIL ============ */
.detail-section { margin-bottom: 18px; }
.detail-section-title {
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-3);
  margin-bottom: 8px;
  display: flex; align-items: center; gap: 8px;
}
.detail-section-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--line);
}

.detail-row {
  display: flex; justify-content: space-between;
  padding: 6px 0;
  border-bottom: 1px dashed var(--line);
  font-size: 13px;
}
.detail-row:last-child { border-bottom: none; }
.detail-key { color: var(--ink-2); }
.detail-val { font-weight: 600; }

.status-selector {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 5px;
}
.status-btn {
  padding: 8px 4px;
  background: var(--bg);
  border: 1px solid var(--line);
  border-radius: 4px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--ink-2);
  display: flex; align-items: center; justify-content: center; gap: 5px;
}
.status-btn:hover { color: var(--ink); border-color: var(--ink-3); }
.status-btn .dot {
  width: 7px; height: 7px;
  background: var(--btn-color);
  border-radius: 50%;
}
.status-btn.current {
  background: var(--btn-color);
  color: #000;
  border-color: var(--btn-color);
}
.status-btn.current .dot { background: #000; }

/* ============ TRUCK ROW ============ */
.truck-row {
  background: var(--bg);
  border-radius: 6px;
  border-left: 3px solid var(--t-color, var(--ink-3));
  padding: 10px 12px;
  margin-bottom: 6px;
}
.truck-row-top {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 8px;
}
.truck-plate {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
  background: var(--line);
  padding: 3px 7px;
  border-radius: 3px;
  letter-spacing: 0.05em;
  font-size: 12px;
}
.truck-info {
  flex: 1;
  font-size: 12px;
  color: var(--ink-2);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.truck-info-driver { color: var(--ink); font-weight: 600; }
.truck-status-pill {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: #000;
  background: var(--t-color);
  padding: 3px 7px;
  border-radius: 10px;
}

.truck-progress {
  display: flex; gap: 3px;
  margin-bottom: 8px;
}
.tp-step {
  flex: 1;
  height: 6px;
  background: var(--line);
  border-radius: 2px;
  position: relative;
}
.tp-step.done {
  background: var(--green);
}
.tp-step.current {
  background: var(--accent);
  animation: pulseBar 1.5s infinite;
}
@keyframes pulseBar {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

.truck-actions {
  display: flex; gap: 6px;
}
.tact {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  padding: 6px 10px;
  border-radius: 4px;
  background: var(--bg-3);
  color: var(--ink-2);
  border: 1px solid var(--line);
  display: inline-flex; align-items: center; gap: 5px;
}
.tact:hover { color: var(--ink); border-color: var(--ink-3); }
.tact.tact-wa { color: var(--whatsapp); border-color: rgba(37,211,102,0.3); }
.tact.tact-wa:hover { background: rgba(37,211,102,0.1); border-color: var(--whatsapp); }
.tact.tact-link { color: var(--blue); }

.add-truck {
  padding: 12px;
  border: 1px dashed var(--line-2);
  border-radius: 5px;
  text-align: center;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--ink-2);
  background: transparent;
  width: 100%;
  margin-top: 5px;
}
.add-truck:hover { color: var(--accent); border-color: var(--accent); }

/* ============ TOAST ============ */
.toast {
  position: fixed;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--ink);
  color: #000;
  padding: 10px 18px;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 700;
  z-index: 200;
  opacity: 0;
  pointer-events: none;
  transition: all 0.25s ease;
  display: flex; align-items: center; gap: 8px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ============ DRIVER VIEW ============ */
.driver-view {
  background: linear-gradient(180deg, #0f1115 0%, #161922 100%);
  min-height: 100vh;
  padding: 0;
  position: relative;
  z-index: 10;
}

.driver-header {
  background: #000;
  padding: 16px 20px;
  border-bottom: 2px solid var(--accent);
}
.driver-brand {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 12px;
}
.driver-brand-mark {
  width: 26px; height: 26px;
  background: var(--accent);
  display: grid; place-items: center;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 800;
  color: #000;
  font-size: 14px;
  border-radius: 3px;
}
.driver-brand-name {
  font-weight: 800;
  font-size: 14px;
  letter-spacing: 0.02em;
}
.driver-trip-id {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--ink-3);
  margin-left: auto;
}

.driver-title {
  font-size: 22px;
  font-weight: 800;
  margin-bottom: 4px;
  letter-spacing: -0.02em;
}
.driver-subtitle {
  font-size: 13px;
  color: var(--ink-2);
}

.driver-content {
  padding: 20px;
  max-width: 480px;
  margin: 0 auto;
}

.driver-info-card {
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 16px;
  margin-bottom: 20px;

.driver-steps {

.dstep {
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 14px 16px;
  display: flex; align-items: center; gap: 14px;
  transition: all 0.2s;
}
.dstep-num {
  width: 32px; height: 32px;
  background: var(--bg-3);
  color: var(--ink-3);

.dstep-time {

}
.dstep-action {
  font-size: 24px;
  color: var(--ink-3);
}

.dstep.done {
  background: rgba(74, 222, 128, 0.06);

}
.dstep.done .dstep-num {
  background: var(--green);
  color: #000;
}
.dstep.done .dstep-label { color: var(--ink); }
.dstep.done .dstep-action { color: var(--green); }

.dstep.current {
  background: var(--accent);
  color: #000;
  border-color: var(--accent);
  cursor: pointer;
  box-shadow: 0 8px 24px rgba(255, 204, 51, 0.3);
  animation: glow 2s infinite;
}
@keyframes glow {
  0%, 100% { box-shadow: 0 8px 24px rgba(255, 204, 51, 0.3); }
  50% { box-shadow: 0 8px 32px rgba(255, 204, 51, 0.5); }
}

  background: #000;

}
.dstep.current .dstep-label { color: #000; font-size: 16px; }

.dstep.current .dstep-action { color: #000; font-size: 28px; }

.dstep.locked { opacity: 0.5; }

.driver-photo-btn {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  width: 100%;
  background: var(--bg-3);
  border: 1px dashed var(--line-2);

.driver-photo-btn.has-photo {

.driver-help {

  background: var(--bg-3);
  border-radius: 8px;
  font-size: 12px;
  color: var(--ink-2);
  text-align: center;

.driver-call {

/* ============ RESPONSIVE ============ */

<script>
// ============ ESTADOS ============
const STATES = [
  { id: 'nuevo',       label: 'Pedidos nuevos',  color: '#5eb3ff' },
  { id: 'buscando',    label: 'Buscando camión', color: '#ffcc33' },
  { id: 'parcial',     label: 'Cobertura parcial', color: '#ff9f43' },
  { id: 'cubierto',    label: 'Cubiertos',       color: '#4dd0e1' },
  { id: 'cargando',    label: 'Cargando',        color: '#b794f4' },
  { id: 'viaje',       label: 'En viaje',        color: '#4ade80' },
  { id: 'descargado',  label: 'Descargados',     color: '#6c7280' },
  { id: 'cancelado',   label: 'Cancelados',      color: '#ff5e5b' },
];

// Pasos del chofer (orden fijo)
const DRIVER_STEPS = [
  { id: 'salio_campo',     label: 'Salí hacia el campo',        short: 'Salió hacia el campo',     color: '#5eb3ff' },
  { id: 'llego_campo',     label: 'Llegué al campo',            short: 'En el campo',              color: '#5eb3ff' },
  { id: 'cargando',        label: 'Empecé a cargar',            short: 'Cargando',                 color: '#b794f4' },
  { id: 'cargado',         label: 'Terminé de cargar / Salí',   short: 'Salió cargado',            color: '#b794f4', requirePhoto: true },
  { id: 'llego_destino',   label: 'Llegué al destino',          short: 'En destino',               color: '#4ade80' },
  { id: 'descargado',      label: 'Descargué — viaje cerrado',  short: 'Descargado',               color: '#6c7280', requirePhoto: true },
];

const STORAGE_KEY = 'rueda_orders_v2';
let orders = [];
let currentDetailId = null;
let currentTruckOrderId = null;
let selectedProduct = null;
let currentFilter = 'all';

// ============ STORAGE ============
function loadOrders() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) orders = JSON.parse(raw);
    else seedDemoData();
  } catch (e) { seedDemoData(); }
}
function saveOrders() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(orders)); }
  catch (e) { console.error(e); }
}

function randCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let s = '';
  for (let i = 0; i < 5; i++) s += chars[Math.floor(Math.random() * chars.length)];
  return s;
}

function seedDemoData() {
  const today = new Date().toISOString().slice(0,10);
  const t = Date.now();
  orders = [
    { id: 'P-1042', cliente: 'AGD', origen: 'Lote 7 — Pehuajó', destino: 'Puerto Rosario', producto: 'Soja', cantidad: 5, fecha: today, estado: 'nuevo', obs: 'Acceso por ruta 5', created: t - 3600000, camiones: [] },
    { id: 'P-1041', cliente: 'Don Mario', origen: 'Campo San Luis', destino: 'Planta Daireaux', producto: 'Maíz', cantidad: 8, fecha: today, estado: 'parcial', obs: '', created: t - 7200000, camiones: [
      { code: 'X9K2P', plate: 'AE 234 KL', transportista: 'López Transportes', driver: 'Juan Pérez', phone: '5491155551234', currentStep: 0, history: [] },
      { code: 'A8M3N', plate: 'AC 891 OP', transportista: 'López Transportes', driver: 'Carlos Gómez', phone: '5491155552345', currentStep: 1, history: [{ step: 0, time: t - 5400000 }] },
      { code: 'B7L4Q', plate: 'AB 445 RT', transportista: 'Pérez Cargas', driver: 'Roberto Díaz', phone: '5491155553456', currentStep: 2, history: [{ step: 0, time: t - 6000000 }, { step: 1, time: t - 4800000 }] },
      { code: 'C6N5R', plate: 'AD 102 MN', transportista: 'Pérez Cargas', driver: 'Diego Romero', phone: '5491155554567', currentStep: 3, history: [{ step: 0, time: t - 6600000 }, { step: 1, time: t - 5400000 }, { step: 2, time: t - 3600000 }] },
      { code: 'D5P6S', plate: 'AF 778 QW', transportista: 'Rueda propia', driver: 'Hernán Castro', phone: '5491155555678', currentStep: 0, history: [] },
    ]},
    { id: 'P-1040', cliente: 'Bunge', origen: 'Estancia La María', destino: 'Puerto San Lorenzo', producto: 'Trigo', cantidad: 3, fecha: today, estado: 'viaje', obs: '', created: t - 18000000, camiones: [
      { code: 'E4Q7T', plate: 'AG 552 PA', transportista: 'Rueda propia', driver: 'Mario Bianchi', phone: '5491155556789', currentStep: 4, history: [{step:0,time:t-17000000},{step:1,time:t-15000000},{step:2,time:t-13000000},{step:3,time:t-11000000,photo:true}] },
      { code: 'F3R8U', plate: 'AH 990 LL', transportista: 'Rueda propia', driver: 'Pablo Méndez', phone: '5491155557890', currentStep: 4, history: [{step:0,time:t-16000000},{step:1,time:t-14000000},{step:2,time:t-12000000},{step:3,time:t-10000000,photo:true}] },
      { code: 'G2S9V', plate: 'AC 123 KK', transportista: 'González Hnos', driver: 'Luis Fernández', phone: '5491155558901', currentStep: 4, history: [{step:0,time:t-15000000},{step:1,time:t-13000000},{step:2,time:t-11000000},{step:3,time:t-9000000,photo:true}] },
    ]},
    { id: 'P-1039', cliente: 'Cargill', origen: 'Lote 12 — Trenque', destino: 'Puerto Quequén', producto: 'Girasol', cantidad: 4, fecha: today, estado: 'buscando', obs: 'Urgente — barco zarpa viernes', created: t - 10800000, camiones: [] },
    { id: 'P-1038', cliente: 'AGD', origen: 'Campo Norte', destino: 'Planta Necochea', producto: 'Soja', cantidad: 6, fecha: today, estado: 'cubierto', obs: '', created: t - 14400000, camiones: [
      { code: 'H1T0W', plate: 'AA 111 BB', transportista: 'Rueda propia', driver: 'Ariel Suárez', phone: '5491155559012', currentStep: 0, history: [] },
      { code: 'I0U1X', plate: 'AA 222 BB', transportista: 'Rueda propia', driver: 'Sergio Acuña', phone: '5491155550123', currentStep: 0, history: [] },
      { code: 'J9V2Y', plate: 'AA 333 BB', transportista: 'López Transportes', driver: 'Marcos Vidal', phone: '5491155551235', currentStep: 0, history: [] },
      { code: 'K8W3Z', plate: 'AA 444 BB', transportista: 'López Transportes', driver: 'Néstor Sosa', phone: '5491155552346', currentStep: 0, history: [] },
      { code: 'L7X4A', plate: 'AA 555 BB', transportista: 'Pérez Cargas', driver: 'Rubén Ojeda', phone: '5491155553457', currentStep: 0, history: [] },
      { code: 'M6Y5B', plate: 'AA 666 BB', transportista: 'Pérez Cargas', driver: 'Daniel Quiroga', phone: '5491155554568', currentStep: 0, history: [] },
    ]},
    { id: 'P-1037', cliente: 'Vicentín', origen: 'Lote 4 — Pehuajó', destino: 'Puerto Rosario', producto: 'Soja', cantidad: 2, fecha: today, estado: 'cancelado', obs: 'Cliente canceló por lluvia', created: t - 28800000, camiones: [] },
  ];
  saveOrders();
}

function asignadosCount(o) {
  return o.camiones.length;
}

// auto-update estado pedido en base a sus camiones
function recomputeOrderState(o) {
  if (o.estado === 'cancelado') return;
  const n = o.camiones.length;
  if (n === 0) {
    o.estado = (o.estado === 'buscando') ? 'buscando' : 'nuevo';
    return;
  }
  // todos descargados?
  if (o.camiones.every(t => t.currentStep === 5)) { o.estado = 'descargado'; return; }
  // alguno en viaje (paso 3 o 4)?
  if (o.camiones.some(t => t.currentStep === 3 || t.currentStep === 4)) { o.estado = 'viaje'; return; }
  // alguno cargando (paso 2)?
  if (o.camiones.some(t => t.currentStep === 2)) { o.estado = 'cargando'; return; }
  // cobertura
  if (n < o.cantidad) { o.estado = 'parcial'; return; }
  o.estado = 'cubierto';
}

// ============ CLOCK ============
function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  const el = document.getElementById('clock-time');
  if (el) el.textContent = `${h}:${m}`;
  const opts = { weekday: 'short', day: 'numeric', month: 'short' };
  const dl = document.getElementById('date-label');
  if (dl) dl.textContent = now.toLocaleDateString('es-AR', opts).toUpperCase().replace('.','');
}

// ============ STATS ============
function renderStats() {
  const active = orders.filter(o => !['descargado','cancelado'].includes(o.estado));
  const totalCamiones = active.reduce((s,o) => s + o.cantidad, 0);
  const asignados = active.reduce((s,o) => s + o.camiones.length, 0);
  const pendientes = totalCamiones - asignados;
  const cancelados = orders.filter(o => o.estado === 'cancelado').length;
  // camiones en viaje = aquellos en paso 3 o 4
  let enViaje = 0;
  orders.forEach(o => o.camiones.forEach(t => { if (t.currentStep === 3 || t.currentStep === 4) enViaje++; }));

  const pct = totalCamiones ? Math.round((asignados / totalCamiones) * 100) : 0;

  document.getElementById('stats').innerHTML = `
    <div class="stat">
      <div class="stat-label">Pedidos activos</div>
      <div class="stat-value">${active.length}</div>
    </div>
    <div class="stat">
      <div class="stat-label">Camiones pedidos</div>
      <div class="stat-value blue">${totalCamiones}</div>
    </div>
    <div class="stat">
      <div class="stat-label">Cubiertos / Cobertura</div>
      <div class="stat-value green">${asignados}<span class="small">${pct}%</span></div>
    </div>
    <div class="stat">
      <div class="stat-label">Pendientes</div>
      <div class="stat-value yellow">${pendientes}</div>
    </div>
    <div class="stat">
      <div class="stat-label">En viaje · Cancelados</div>
      <div class="stat-value">${enViaje}<span class="small">·</span><span style="color: var(--red)">${cancelados}</span></div>
    </div>
  `;
}

// ============ FILTERS ============
function renderFilters() {
  const products = ['Soja','Maíz','Trigo','Girasol','Sorgo','Cebada','Avena','Otro'];
  const counts = {};
  products.forEach(p => counts[p] = orders.filter(o => o.producto === p).length);

  let html = `<button class="filter-chip ${currentFilter==='all'?'active':''}" onclick="setFilter('all')">
    Todos <span class="count">${orders.length}</span>
  </button>`;
  products.forEach(p => {
    if (counts[p] > 0) {
      html += `<button class="filter-chip ${currentFilter===p?'active':''}" onclick="setFilter('${p}')">
        ${p} <span class="count">${counts[p]}</span>
      </button>`;
    }
  });
  html += `<div class="search-box">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
    <input type="text" id="search-input" placeholder="Buscar cliente, ID..." oninput="renderBoard()">
  </div>`;
  document.getElementById('filters').innerHTML = html;
}

function setFilter(f) {
  currentFilter = f;
  renderFilters();
  renderBoard();
}

// ============ BOARD ============
function renderBoard() {
  const search = (document.getElementById('search-input')?.value || '').toLowerCase().trim();
  let filtered = orders;
  if (currentFilter !== 'all') filtered = filtered.filter(o => o.producto === currentFilter);
  if (search) filtered = filtered.filter(o =>
    o.cliente.toLowerCase().includes(search) ||
    o.id.toLowerCase().includes(search) ||
    o.origen.toLowerCase().includes(search) ||
    o.destino.toLowerCase().includes(search)
  );

  let html = '';
  STATES.forEach(state => {
    const items = filtered.filter(o => o.estado === state.id);
    html += `<div class="column" style="--col-color: ${state.color}">
      <div class="column-header">
        <div class="column-title">
          <span class="column-title-dot"></span>
          ${state.label}
        </div>
        <div class="column-count">${items.length}</div>
      </div>
      <div class="column-body">`;
    if (items.length === 0) {
      html += `<div class="empty-col">— vacío —</div>`;
    } else {
      items.sort((a,b) => b.created - a.created).forEach(o => {
        const asig = o.camiones.length;
        const pct = o.cantidad ? Math.round((asig / o.cantidad) * 100) : 0;
        const elapsed = formatElapsed(Date.now() - o.created);
        html += `<div class="card" style="--col-color: ${state.color}" onclick="openDetail('${o.id}')">
          <div class="card-head">
            <span class="card-id">${o.id}</span>
            <span class="card-time">${elapsed}</span>
          </div>
          <div class="card-client">${o.cliente}</div>
          <div class="card-route">
            <span>${o.origen}</span>
            <span class="arrow">→</span>
            <span>${o.destino}</span>
          </div>
          <div class="card-foot">
            <span class="card-product">${o.producto}</span>
            <div class="coverage">
              <div class="coverage-bar"><div class="coverage-fill" style="width: ${pct}%"></div></div>
              <span class="coverage-text">${asig}/${o.cantidad}</span>
            </div>
          </div>
        </div>`;
      });
    }
    html += `</div></div>`;
  });
  document.getElementById('board').innerHTML = html;
}

function formatElapsed(ms) {
  const min = Math.floor(ms / 60000);
  if (min < 1) return 'ahora';
  if (min < 60) return `${min}m`;
  const h = Math.floor(min / 60);
  if (h < 24) return `${h}h`;
  const d = Math.floor(h / 24);
  return `${d}d`;
}

function formatTime(ms) {
  const d = new Date(ms);
  return d.toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });
}

// ============ NUEVO PEDIDO ============
function openNewOrder() {
  document.getElementById('f-cliente').value = '';
  document.getElementById('f-origen').value = '';
  document.getElementById('f-destino').value = '';
  document.getElementById('f-cantidad').value = 1;
  document.getElementById('f-fecha').value = new Date().toISOString().slice(0,10);
  document.getElementById('f-obs').value = '';
  selectedProduct = null;
  document.querySelectorAll('#f-producto .product-pill').forEach(p => p.classList.remove('selected'));
  openModal('modal-new');
  setTimeout(() => document.getElementById('f-cliente').focus(), 100);
}

function adjustQty(delta) {
  const inp = document.getElementById('f-cantidad');
  const cur = parseInt(inp.value) || 1;
  inp.value = Math.max(1, Math.min(99, cur + delta));
}

document.addEventListener('click', (e) => {
  if (e.target.classList.contains('product-pill')) {
    document.querySelectorAll('#f-producto .product-pill').forEach(p => p.classList.remove('selected'));
    e.target.classList.add('selected');
    selectedProduct = e.target.dataset.prod;
  }
});

function saveOrder() {
  const cliente = document.getElementById('f-cliente').value.trim();
  const origen = document.getElementById('f-origen').value.trim();
  const destino = document.getElementById('f-destino').value.trim();
  const cantidad = parseInt(document.getElementById('f-cantidad').value) || 1;
  const fecha = document.getElementById('f-fecha').value;
  const obs = document.getElementById('f-obs').value.trim();

  if (!cliente) { showToast('Falta el cliente', true); document.getElementById('f-cliente').focus(); return; }
  if (!origen) { showToast('Falta el origen', true); return; }
  if (!destino) { showToast('Falta el destino', true); return; }
  if (!selectedProduct) { showToast('Elegí un producto', true); return; }

  const nextNum = Math.max(1042, ...orders.map(o => parseInt(o.id.replace('P-','')) || 0)) + 1;
  const newOrder = {
    id: 'P-' + nextNum,
    cliente, origen, destino,
    producto: selectedProduct,
    cantidad, fecha, obs,
    estado: 'nuevo',
    created: Date.now(),
    camiones: []
  };
  orders.unshift(newOrder);
  saveOrders();
  closeModal('modal-new');
  renderStats(); renderFilters(); renderBoard();
  showToast(`Pedido ${newOrder.id} creado`);
}

// ============ DETALLE ============
function openDetail(id) {
  currentDetailId = id;
  renderDetail();
  openModal('modal-detail');
}

function renderDetail() {
  const o = orders.find(x => x.id === currentDetailId);
  if (!o) return;
  document.getElementById('d-id').textContent = o.id;
  document.getElementById('d-cliente').textContent = o.cliente;

  const asig = o.camiones.length;
  const pct = o.cantidad ? Math.round((asig / o.cantidad) * 100) : 0;

  let html = `
    <div class="detail-section">
      <div class="detail-section-title">Pedido</div>
      <div class="detail-row"><span class="detail-key">Producto</span><span class="detail-val">${o.producto}</span></div>
      <div class="detail-row"><span class="detail-key">Origen</span><span class="detail-val">${o.origen}</span></div>
      <div class="detail-row"><span class="detail-key">Destino</span><span class="detail-val">${o.destino}</span></div>
      <div class="detail-row"><span class="detail-key">Fecha carga</span><span class="detail-val">${formatDate(o.fecha)}</span></div>
      <div class="detail-row"><span class="detail-key">Cobertura</span><span class="detail-val">${asig} / ${o.cantidad} camiones · ${pct}%</span></div>
      ${o.obs ? `<div class="detail-row"><span class="detail-key">Observaciones</span><span class="detail-val" style="text-align:right; max-width:60%">${o.obs}</span></div>` : ''}
    </div>

    <div class="detail-section">
      <div class="detail-section-title">Estado del pedido</div>
      <div class="status-selector">
        ${STATES.map(s => `
          <button class="status-btn ${s.id === o.estado ? 'current' : ''}" style="--btn-color: ${s.color}" onclick="changeState('${s.id}')">
            <span class="dot"></span> ${s.label}
          </button>
        `).join('')}
      </div>
    </div>

    <div class="detail-section">
      <div class="detail-section-title">Camiones (${o.camiones.length})</div>
      ${o.camiones.map((t,i) => renderTruckRow(o, t, i)).join('')}
      <button class="add-truck" onclick="openNewTruck()">+ Asignar camión</button>
    </div>
  `;
  document.getElementById('d-body').innerHTML = html;
}

function renderTruckRow(o, t, i) {
  const step = DRIVER_STEPS[t.currentStep] || DRIVER_STEPS[0];
  const isDone = t.currentStep >= 5 && t.history.length >= 6;
  // Estado actual del camión (texto corto)
  let statusLabel, statusColor;
  if (t.history.length === 0) {
    statusLabel = 'Asignado'; statusColor = '#5eb3ff';
  } else {
    const last = DRIVER_STEPS[t.currentStep - 1] || step;
    statusLabel = last.short;
    statusColor = last.color;
  }
  if (isDone) { statusLabel = 'Descargado'; statusColor = '#6c7280'; }

  const stepsHtml = DRIVER_STEPS.map((s, idx) => {
    let cls = '';
    if (t.history.find(h => h.step === idx)) cls = 'done';
    else if (idx === t.currentStep && !isDone) cls = 'current';
    return `<div class="tp-step ${cls}"></div>`;
  }).join('');

  return `
    <div class="truck-row" style="--t-color: ${statusColor}">
      <div class="truck-row-top">
        <span class="truck-plate">${t.plate}</span>
        <div class="truck-info">
          <span class="truck-info-driver">${t.driver || '—'}</span>
          <span style="color: var(--ink-3)"> · ${t.transportista}</span>
        </div>
        <span class="truck-status-pill">${statusLabel}</span>
      </div>
      <div class="truck-progress" title="${statusLabel}">${stepsHtml}</div>
      <div class="truck-actions">
        <button class="tact tact-wa" onclick="sendWhatsApp('${o.id}', ${i})">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946.003-6.556 5.338-11.891 11.893-11.891 3.181.001 6.167 1.24 8.413 3.488 2.245 2.248 3.481 5.236 3.48 8.414-.003 6.557-5.338 11.892-11.893 11.892-1.99-.001-3.951-.5-5.688-1.448l-6.305 1.654z"/></svg>
          Enviar a chofer
        </button>
        <button class="tact tact-link" onclick="viewDriverLink('${o.id}', ${i})">Ver link</button>
        <button class="tact" onclick="removeTruck(${i})">Quitar</button>
      </div>
    </div>
  `;
}

function changeState(newState) {
  const o = orders.find(x => x.id === currentDetailId);
  if (!o) return;
  o.estado = newState;
  saveOrders();
  renderDetail();
  renderStats(); renderBoard();
  showToast('Estado actualizado');
}

// ============ ASIGNAR CAMIÓN ============
function openNewTruck() {
  currentTruckOrderId = currentDetailId;
  document.getElementById('t-plate').value = '';
  document.getElementById('t-transp').value = '';
  document.getElementById('t-driver').value = '';
  document.getElementById('t-phone').value = '';
  openModal('modal-truck');
  setTimeout(() => document.getElementById('t-plate').focus(), 100);
}

function saveTruck() {
  const plate = document.getElementById('t-plate').value.trim().toUpperCase();
  const transp = document.getElementById('t-transp').value.trim() || 'Sin asignar';
  const driver = document.getElementById('t-driver').value.trim();
  let phone = document.getElementById('t-phone').value.trim().replace(/\D/g, '');

  if (!plate) { showToast('Falta la patente', true); return; }
  if (!driver) { showToast('Falta el nombre del chofer', true); return; }

  // Argentina: si no empieza con 54, le agregamos
  if (phone && !phone.startsWith('54')) phone = '54' + phone;

  const o = orders.find(x => x.id === currentTruckOrderId);
  if (!o) return;
  o.camiones.push({
    code: randCode(),
    plate, transportista: transp, driver, phone,
    currentStep: 0, history: []
  });
  recomputeOrderState(o);
  saveOrders();
  closeModal('modal-truck');
  renderDetail();
  renderStats(); renderBoard();
  showToast('Camión asignado · enviá el link al chofer');
}

function removeTruck(idx) {
  const o = orders.find(x => x.id === currentDetailId);
  if (!o) return;
  if (!confirm('¿Quitar este camión del pedido?')) return;
  o.camiones.splice(idx, 1);
  recomputeOrderState(o);
  saveOrders();
  renderDetail();
  renderStats(); renderBoard();
  showToast('Camión removido');
}

// ============ WHATSAPP ============
function sendWhatsApp(orderId, truckIdx) {
  const o = orders.find(x => x.id === orderId);
  if (!o) return;
  const t = o.camiones[truckIdx];
  if (!t) return;

  const link = window.location.origin + window.location.pathname + '#chofer=' + t.code;
  const msg = `Hola ${t.driver}, viaje asignado:\n\n` +
    `📋 ${o.cliente} — ${o.producto}\n` +
    `🚜 ${o.origen}\n` +
    `📍 ${o.destino}\n` +
    `🗓 Fecha: ${formatDate(o.fecha)}\n` +
    `🚛 Patente: ${t.plate}\n\n` +
    `Marcá tu progreso acá:\n${link}`;

  if (t.phone) {
    const waLink = `https://wa.me/${t.phone}?text=${encodeURIComponent(msg)}`;
    window.open(waLink, '_blank');
  } else {
    // sin tel: copiar al portapapeles
    navigator.clipboard.writeText(msg).then(() => {
      showToast('Mensaje copiado — pegalo en WhatsApp');
    });
  }
}

function viewDriverLink(orderId, truckIdx) {
  const o = orders.find(x => x.id === orderId);
  const t = o?.camiones[truckIdx];
  if (!t) return;
  // abre la vista del chofer en otra pestaña
  const url = window.location.pathname + '#chofer=' + t.code;
  window.open(url, '_blank');
}

function deleteOrder() {
  if (!confirm('¿Eliminar este pedido por completo?')) return;
  orders = orders.filter(o => o.id !== currentDetailId);
  saveOrders();
  closeModal('modal-detail');
  renderStats(); renderFilters(); renderBoard();
  showToast('Pedido eliminado');
}

function formatDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('es-AR', { day:'2-digit', month:'short' });
}

// ============ MODAL HELPERS ============
function openModal(id) { document.getElementById(id).classList.add('active'); }
function closeModal(id) { document.getElementById(id).classList.remove('active'); }

document.querySelectorAll('.modal-backdrop').forEach(b => {
  b.addEventListener('click', (e) => {
    if (e.target === b) b.classList.remove('active');
  });
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    document.querySelectorAll('.modal-backdrop.active').forEach(m => m.classList.remove('active'));
  }
  if (e.key === 'n' && !e.target.matches('input, textarea, select')) {
    openNewOrder();
  }
});

// ============ TOAST ============
function showToast(msg, isError) {
  const t = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = msg;
  t.style.background = isError ? '#ff5e5b' : 'var(--ink)';
  t.style.color = isError ? '#fff' : '#000';
  t.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// =====================================================================
// ============ VISTA CHOFER (acceso por link) =========================
// =====================================================================

function getDriverCodeFromUrl() {
  const m = window.location.hash.match(/chofer=([A-Z0-9]+)/i);
  return m ? m[1].toUpperCase() : null;
}

function findTruckByCode(code) {
  for (const o of orders) {
    const idx = o.camiones.findIndex(t => t.code === code);
    if (idx !== -1) return { order: o, truck: o.camiones[idx], idx };
  }
  return null;
}

function renderDriverView() {
  const code = getDriverCodeFromUrl();
  if (!code) {
    document.getElementById('view-logistico').style.display = '';
    document.getElementById('view-chofer').style.display = 'none';
    return;
  }
  document.getElementById('view-logistico').style.display = 'none';
  document.getElementById('view-chofer').style.display = '';

  const found = findTruckByCode(code);
  const container = document.getElementById('view-chofer');

  if (!found) {
    container.innerHTML = `
      <div class="driver-header">
        <div class="driver-brand">
          <div class="driver-brand-mark">R</div>
          <div class="driver-brand-name">RUEDA</div>
        </div>
        <div class="driver-title">Link inválido</div>
        <div class="driver-subtitle">Este viaje no existe o ya fue cerrado.</div>
      </div>
      <div class="driver-content">
        <div class="driver-help">
          Pedile al logístico que te envíe un link nuevo.
        </div>
      </div>
    `;
    return;
  }

  const { order: o, truck: t, idx: ti } = found;

  let stepsHtml = '';
  DRIVER_STEPS.forEach((s, i) => {
    const hist = t.history.find(h => h.step === i);
    const isDone = !!hist;
    const isCurrent = i === t.currentStep && !isDone;
    const isLocked = i > t.currentStep;

    let cls = '';
    let icon = '';
    let timeLabel = '';

    if (isDone) {
      cls = 'done';
      icon = '✓';
      timeLabel = `Marcado a las ${formatTime(hist.time)}${hist.photo ? ' · foto adjunta' : ''}`;
    } else if (isCurrent) {
      cls = 'current';
      icon = '→';
      timeLabel = s.requirePhoto ? 'Tocá para marcar + foto del remito' : 'Tocá para marcar';
    } else {
      cls = 'locked';
      icon = '○';
      timeLabel = 'Pendiente';
    }

    const onclick = isCurrent ? `onclick="driverMarkStep('${code}', ${i})"` : '';

    stepsHtml += `
      <div class="dstep ${cls}" ${onclick}>
        <div class="dstep-num">${i + 1}</div>
        <div class="dstep-content">
          <div class="dstep-label">${s.label}</div>
          <div class="dstep-time">${timeLabel}</div>
        </div>
        <div class="dstep-action">${icon}</div>
      </div>
    `;
  });

  const allDone = t.currentStep >= 6 || (t.currentStep === 5 && t.history.find(h => h.step === 5));

  container.innerHTML = `
    <div class="driver-header">
      <div class="driver-brand">
        <div class="driver-brand-mark">R</div>
        <div class="driver-brand-name">RUEDA</div>
        <div class="driver-trip-id">#${t.code}</div>
      </div>
      <div class="driver-title">${o.cliente} — ${o.producto}</div>
      <div class="driver-subtitle">Camión ${t.plate} · Chofer ${t.driver || '—'}</div>
    </div>

    <div class="driver-content">
      <div class="driver-info-card">
        <div class="di-row"><span class="di-key">Origen</span><span class="di-val">${o.origen}</span></div>
        <div class="di-row"><span class="di-key">Destino</span><span class="di-val">${o.destino}</span></div>
        <div class="di-row"><span class="di-key">Fecha</span><span class="di-val">${formatDate(o.fecha)}</span></div>
        ${o.obs ? `<div class="di-row"><span class="di-key">Notas</span><span class="di-val">${o.obs}</span></div>` : ''}
      </div>

      ${allDone ? `
        <div style="text-align:center; padding: 30px 20px; background: rgba(74,222,128,0.08); border: 1px solid rgba(74,222,128,0.3); border-radius: 12px;">
          <div style="font-size: 40px; margin-bottom: 8px;">✓</div>
          <div style="font-size: 18px; font-weight: 800; color: var(--green); margin-bottom: 4px;">VIAJE CERRADO</div>
          <div style="color: var(--ink-2); font-size: 13px;">Gracias. Todos los pasos quedaron registrados.</div>
        </div>
      ` : `
        <div class="driver-steps">${stepsHtml}</div>
      `}

      <div class="driver-help">
        Tocá el botón <b>amarillo</b> cuando hayas hecho ese paso. El logístico lo ve al instante.
        <br><br>
        Si tenés un problema, hablá con el logístico por WhatsApp aparte.
      </div>
    </div>
  `;
}

function driverMarkStep(code, stepIdx) {
  const found = findTruckByCode(code);
  if (!found) return;
  const { order: o, truck: t } = found;
  if (stepIdx !== t.currentStep) return;

  const step = DRIVER_STEPS[stepIdx];
  let photo = false;

  if (step.requirePhoto) {
    if (!confirm(`Para marcar "${step.label}" necesitás adjuntar la foto del remito.\n\n¿Tenés la foto lista?`)) {
      alert('Ok, sacá la foto y volvé a tocar el botón.');
      return;
    }
    photo = true;
  }

  t.history.push({ step: stepIdx, time: Date.now(), photo });
  t.currentStep = stepIdx + 1;
  recomputeOrderState(o);
  saveOrders();
  renderDriverView();
  // notif visual
  const toast = document.getElementById('toast');
  if (toast) {
    document.getElementById('toast-msg').textContent = '✓ Paso marcado';
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  }
}

// listen hash changes to switch views
window.addEventListener('hashchange', () => {
  init();
});

// ============ INIT ============
function init() {
  loadOrders();
  const driverCode = getDriverCodeFromUrl();
  if (driverCode) {
    renderDriverView();
  } else {
    document.getElementById('view-logistico').style.display = '';
    document.getElementById('view-chofer').style.display = 'none';
    updateClock();
    renderStats();
    renderFilters();
    renderBoard();
  }
}

init();
setInterval(() => {
  if (!getDriverCodeFromUrl()) {
    updateClock();
    renderBoard();
    renderStats();
  } else {
    // re-render driver view to refresh (in case logistico cambió algo)
    renderDriverView();
  }
}, 30000);
</script>
